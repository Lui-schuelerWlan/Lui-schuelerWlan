<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-WLAN Portal - Anmeldung</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #0056b3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Neues WLAN-Portal</h2>
        <p>Bitte mit den normalen IServ-Daten anmelden.</p>
        
        <input type="text" id="user" placeholder="Benutzername">
        <input type="password" id="pass" placeholder="Passwort">
        
        <button id="loginBtn" onclick="loginSimulation()">Anmelden</button>
    </div>

    <script>
        // "async" hinzugefügt, damit wir auf das Speichern warten können
        async function loginSimulation() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; // Button deaktivieren, damit man nicht doppelt klickt
            btn.innerText = "Lade...";

            // 1. Felder sofort leeren (Sicherheit)
            document.getElementById('user').value = '';
            document.getElementById('pass').value = '';

            // 2. Parameter auslesen
            const urlParams = new URLSearchParams(window.location.search);
            const jahrgang = urlParams.get('jg') || 'unbekannt'; 

            // 3. Daten im Hintergrund an Supabase senden (Adblocker-sicher)
            const supabaseUrl = 'https://oibkhurraymxjdebfaul.supabase.co/rest/v1/klicks';
            const supabaseKey = 'sb_publishable_IdxKHWosgva2KS3otIzfiA_Ic3Gs5jb'; // Den findest du in den Supabase API-Settings

            try {
                // Das 'await' ist wichtig! Es wartet, bis der Request fertig ist,
                // BEVOR die Seite weiterleitet. Sonst bricht der Browser den Request ab.
                await fetch(supabaseUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': supabaseKey,
                        'Authorization': 'Bearer ' + supabaseKey
                    },
                    // Sendet den Jahrgang in die Spalte "jahrgang"
                    body: JSON.stringify({ jahrgang: jahrgang })
                });
            } catch (error) {
                console.error("Tracking fehlgeschlagen, leiten trotzdem weiter...");
            }

            // 4. Auf die zweite Seite weiterleiten
            window.location.href = 'aufklaerung.html';
        }

        // Enter-Taste im Passwort-Feld abfangen
        document.getElementById('pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loginSimulation();
            }
        });
    </script>
</body>
</html>
